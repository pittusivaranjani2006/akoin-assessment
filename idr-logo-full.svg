<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 80" width="320" height="80">
  <defs>
    <linearGradient id="faceTop2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FF6B1A;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#E85000;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="faceLeft2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#1A1A1A;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2D2D2D;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="faceRight2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#333333;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#4A4A4A;stop-opacity:1" />
    </linearGradient>
  </defs>
  <!-- Cube icon -->
  <polygon points="40,8 68,24 40,40 12,24" fill="url(#faceTop2)" />
  <polygon points="12,24 40,40 40,72 12,56" fill="url(#faceLeft2)" />
  <polygon points="68,24 40,40 40,72 68,56" fill="url(#faceRight2)" />
  <polygon points="40,14 62,26 40,38 18,26" fill="none" stroke="rgba(255,255,255,0.25)" stroke-width="1"/>
  <line x1="40" y1="40" x2="40" y2="72" stroke="rgba(255,107,26,0.4)" stroke-width="1.5"/>
  <circle cx="40" cy="8" r="2.5" fill="white" opacity="0.9"/>

  <!-- Wordmark -->
  <!-- IDR acronym bold -->
  <text x="88" y="34" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-weight="800" font-size="28" letter-spacing="4" fill="#1A1A1A">IDR</text>
  <!-- Separator line -->
  <rect x="88" y="40" width="220" height="1.5" fill="#FF6B1A" opacity="0.5"/>
  <!-- Full name -->
  <text x="89" y="58" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-weight="400" font-size="11" letter-spacing="2.5" fill="#444444">INSTITUTE OF DIGITAL RISK</text>
</svg>
